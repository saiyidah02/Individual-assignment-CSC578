<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Landing Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <img id="header-img" src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" alt="Logo">
    <nav id="nav-bar">
      <a href="#features" class="nav-link">Features</a>
      <a href="#video-section" class="nav-link">Demo</a>
      <a href="#signup" class="nav-link">Sign Up</a>
    </nav>
  </header>

  <!-- Main Sections -->
  <section id="features">
    <h2>Features</h2>
    <p>Our product offers cutting-edge performance, sleek design, and easy integration.</p>
    <p>Built with modern technology to adapt to your needs.</p>
  </section>

  <section id="video-section">
    <h2>Product Demo</h2>
    <video id="video" controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
  </section>

  <section id="signup">
    <h2>Stay Updated</h2>
    <form id="form" action="https://www.freecodecamp.org/email-submit">
      <input id="email" name="email" type="email" placeholder="Enter your email" required>
      <input id="submit" type="submit" value="Subscribe">
    </form>
  </section>
</body>
</html>
